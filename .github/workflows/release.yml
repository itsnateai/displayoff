name: Release

# Auto-build displayoff-vX.Y.Z.zip + SHA256SUMS.txt on every annotated semver
# tag push (v*.*.*) and attach them to the matching GitHub release. The
# release itself must already exist (created via `gh release create` or the
# web UI) at the time the tag pushes — softprops/action-gh-release tolerates
# this: if the release exists, it uploads to it; if it doesn't, it creates one.
#
# v1.7.22: asset format changed from a single `displayoff.exe` to a zipped
# Nuitka --standalone bundle (`displayoff-vX.Y.Z.zip` containing a
# `displayoff/` folder with the .exe + ~150 runtime DLLs). The previous
# onefile bootstrap pattern tripped Defender's Trojan:Win32/Bearfoos.A!ml
# heuristic on every launch (Temp extraction); --standalone has no Temp
# extraction so the false-positive disappears. See build-release.sh's
# v1.7.22 comment block for the full context.
#
# Why the build runs in CI instead of locally:
#   - Reproducibility — a clean windows-latest runner with no Nuitka cache
#     bytes from prior local builds matches what an external auditor would
#     reproduce.
#   - SHA256 transparency — the manifest is computed from bytes the runner
#     just built, never bytes that touched the maintainer's machine.
#
# Build cost: ~5-10 min on github-hosted windows-latest. timeout-minutes is
# 30 to absorb Nuitka's first-time MinGW64 download path (worst-case ~7 min
# extra on a cold cache).
#
# Action pins: all third-party actions pinned to a full commit SHA per the
# workspace supply-chain baseline (`memory/reference_supply_chain_baseline_2026_05_15.md`).
# Tag comments document the human-readable version the SHA resolved at the
# time of pinning — bump the SHA, bump the comment.

on:
  push:
    tags:
      - "v*.*.*"
  # Manual dispatch lets you build + smoke-test a tag without re-creating
  # it. Useful when an artifact upload failed and the release exists but
  # the assets are missing.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.7.15). Must already exist."
        required: true
        type: string

permissions:
  contents: read   # v1.7.20: workflow-root least-privilege. Only the
                   # softprops upload step needs write — every other step
                   # (checkout, install, build, smoke) runs read-only.

jobs:
  build-windows-exe:
    name: Build displayoff bundle (windows-latest)
    runs-on: windows-latest
    timeout-minutes: 30
    # v1.7.20 verifier convergence (T1-Sonnet + T1-Opus): GitHub Actions only
    # supports `permissions:` at workflow root and job level, NOT at step
    # level. A step-level permissions key is silently ignored. Putting the
    # write permission here at the job scope (with workflow root staying
    # `contents: read`) gives the softprops upload step the write token it
    # needs without leaking write across other jobs we might add later.
    permissions:
      contents: write
    steps:
      - name: Checkout
        # One step handles both triggers via conditional ref:
        # - push: ref = github.sha (the commit the tag points to; stable
        #   against tag re-resolution between trigger and checkout)
        # - workflow_dispatch: ref = inputs.tag (the explicit tag the user
        #   asked to build; default checkout behavior would otherwise pick
        #   default-branch HEAD, not the tag)
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.sha }}

      - name: Setup Python 3.14
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: "3.14"

      - name: Verify tag matches __version__ (drift guard)
        # build-release.sh derives the zip name from `__version__` in
        # displayoff.py. The smoke test downstream constructs its URL from
        # ${TAG}. If tag and __version__ drift (e.g. tag is v1.7.23 but
        # __version__ still reads 1.7.22 at the checked-out ref), the build
        # produces displayoff-v1.7.22.zip, softprops uploads it (the glob
        # build/displayoff-v*.zip is permissive), and the smoke test 404s on
        # displayoff-v1.7.23.zip — with the misleading error "CDN host not in
        # allowlist" rather than the real cause. Fail loudly HERE instead.
        shell: bash
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # Defense-in-depth: reject anything other than a strict semver tag
          # `vMAJOR.MINOR.PATCH` BEFORE using TAG in any downstream string.
          # The trigger glob `v*.*.*` (line 36) also matches pre-release
          # (`v1.7.22-rc1`), build-metadata (`v1.7.22+build5`), and 4-segment
          # (`v1.7.22.1`) tags — none of which build-release.sh's zip naming
          # supports. workflow_dispatch additionally accepts arbitrary strings
          # (the input is `type: string`), so a typo like `main` would otherwise
          # reach the URL construction step. Fail loudly here with a clear
          # message, not later with a misleading "drift" or "404" error.
          if ! [[ "$TAG" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Tag '$TAG' is not strict semver vMAJOR.MINOR.PATCH"
            echo "::error::This workflow does not currently support pre-release tags (e.g. v1.7.22-rc1)"
            echo "::error::or build-metadata tags (e.g. v1.7.22+build5). If you need that, extend"
            echo "::error::build-release.sh's zip naming + this guard together."
            exit 1
          fi
          # Strip leading 'v' from TAG; __version__ in displayoff.py has no prefix.
          EXPECTED="${TAG#v}"
          # encoding='utf-8' so the guard doesn't crash on non-ASCII bytes above
          # the __version__ line (windows-latest default is cp1252).
          ACTUAL=$(python -c "import re,sys; m=re.search(r'^__version__\s*=\s*[\"\x27]([^\"\x27]+)[\"\x27]', open('displayoff.py', encoding='utf-8').read(), re.M); sys.exit('no __version__ found in displayoff.py') if not m else print(m.group(1))")
          if [ "$ACTUAL" != "$EXPECTED" ]; then
            echo "::error::Tag/version drift: TAG=$TAG (expected __version__=$EXPECTED) but displayoff.py has __version__=$ACTUAL"
            echo "::error::Fix one of:"
            echo "::error::  (a) bump __version__ in displayoff.py to $EXPECTED, commit, retag at HEAD"
            echo "::error::  (b) move the tag to the commit where __version__=$EXPECTED"
            exit 1
          fi
          echo "OK: tag $TAG matches __version__=$ACTUAL"

      - name: Install build dependencies
        shell: bash
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          # Nuitka is a build-only dep; pinning to match what build-release.sh
          # was validated against. Bump in lockstep with the .bat / .sh
          # comments referencing the Nuitka + py3.14 zstd workaround.
          python -m pip install nuitka==4.1.1

      - name: Build displayoff zip + SHA256SUMS.txt
        shell: bash
        run: ./build-release.sh

      - name: Upload artifacts to the release
        # Pinned to v3.0.0 — softprops/action-gh-release@v3 is the tag the
        # user-facing docs reference, the SHA is the actual security
        # boundary. Re-resolve via `gh api repos/softprops/action-gh-release/git/refs/tags/<tag>`
        # before bumping. v1.7.20 verifier-converged fix: write permission
        # is set at the JOB level (above) — step-level `permissions:` is
        # not a supported GitHub Actions key and would be silently ignored.
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda  # v3.0.0
        with:
          # On push: the ref is the tag GitHub already resolved.
          # On workflow_dispatch: the inputs.tag value drives both checkout
          # ref above AND the release we upload to.
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
          # fail_on_unmatched_files=true so a silent build failure (Nuitka
          # produced no zip but exited 0) doesn't ship an asset-less release.
          # v1.7.22: glob the versioned zip (e.g. `displayoff-v1.7.22.zip`)
          # rather than hard-coding the filename — build-release.sh derives
          # the version from `__version__` in displayoff.py, so the workflow
          # doesn't need a parallel source of truth for the version string.
          fail_on_unmatched_files: true
          files: |
            build/displayoff-v*.zip
            build/SHA256SUMS.txt

      - name: Post-upload CDN redirect-host smoke test
        # v1.7.20 forward-compat defense: GitHub silently swapped the
        # asset CDN from objects.githubusercontent.com →
        # release-assets.githubusercontent.com mid-2025, which broke
        # displayoff's update allowlist in v1.7.13–v1.7.15 (caught only
        # when v1.7.15 → v1.7.16 in-the-wild dance failed). This step
        # downloads the freshly-uploaded asset URL via HEAD-follow and
        # asserts the final redirect target matches one of the hosts
        # the in-app `_download_url_allowed` accepts. If GitHub flips
        # the CDN again, this CI step fails on the next release we cut,
        # giving us a chance to refresh the allowlist BEFORE the broken
        # build ships into production users' update flow.
        shell: bash
        env:
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          # v1.7.22: asset is now the standalone-bundle zip, not the bare .exe.
          # TAG is the full tag like `v1.7.22`; the zip is named
          # `displayoff-vX.Y.Z.zip` so concatenating ${TAG} into the URL gives
          # the right asset name without a second parse of the version string.
          # The drift guard above ensures TAG and __version__ agree, so the
          # zip the build produced is the zip this URL points to.
          URL="https://github.com/itsnateai/displayoff/releases/download/${TAG}/displayoff-${TAG}.zip"
          echo "Probing redirect chain from: $URL"
          # Capture BOTH the HTTP status of the final response AND the resolved
          # URL via --write-out, so we can distinguish "asset is missing"
          # (HTTP 404) from "asset is present but CDN host drifted"
          # (HTTP 200 + new host).
          #
          # Why explicit HTTP_CODE check instead of `curl --fail`: curl --fail
          # exits non-zero on 4xx/5xx but suppresses the --write-out body on
          # failure, so we'd lose %{url_effective} in the error path. Capturing
          # status + URL unconditionally and asserting status==200 ourselves
          # keeps the diagnostic intact. Asserting HTTP 200 BEFORE the host
          # allowlist is load-bearing: without it, a 404-page redirected to an
          # allowed CDN host would pass the allowlist silently on a missing
          # asset, masking softprops upload failures behind a green CI.
          #
          # Retry-with-backoff handles the documented GitHub release mirror
          # lag (cause (c) in the error block below). Three attempts at
          # 0s/15s/30s covers the typical propagation window without making
          # CI wait absurdly on real failures.
          # BACKOFF drives ATTEMPTS — derive count from array length so a
          # future edit that extends one stays in sync with the other. Bump
          # BACKOFF=(0 15 30 60) to get 4 attempts; ATTEMPTS follows.
          BACKOFF=(0 15 30)
          ATTEMPTS=${#BACKOFF[@]}
          HTTP_CODE=""
          FINAL_URL=""
          CURL_RC=1
          for i in $(seq 0 $((ATTEMPTS - 1))); do
            sleep "${BACKOFF[$i]}"
            echo "Probe attempt $((i + 1))/$ATTEMPTS (after ${BACKOFF[$i]}s wait)"
            set +e
            RESPONSE="$(curl -sIL --max-time 30 -o /dev/null -w '%{http_code} %{url_effective}' "$URL")"
            CURL_RC=$?
            set -e
            HTTP_CODE="${RESPONSE%% *}"
            FINAL_URL="${RESPONSE#* }"
            echo "  rc=$CURL_RC  http=$HTTP_CODE  final=$FINAL_URL"
            if [ "$CURL_RC" -eq 0 ] && [ "$HTTP_CODE" = "200" ]; then
              break
            fi
          done
          if [ "$CURL_RC" -ne 0 ] || [ "$HTTP_CODE" != "200" ]; then
            echo "::error::Asset HEAD probe failed after $ATTEMPTS attempts: rc=$CURL_RC http=$HTTP_CODE"
            echo "::error::URL: $URL"
            echo "::error::Final URL after redirects: $FINAL_URL"
            echo "::error::Likely causes (in order of probability):"
            echo "::error::  (a) softprops upload silently failed despite fail_on_unmatched_files (rare)"
            echo "::error::  (b) build produced a zip whose name doesn't match TAG (check drift guard above)"
            echo "::error::  (c) GitHub release mirror lag past 45s of accumulated sleep / up to 135s wall (rare; manual re-run usually succeeds)"
            exit 1
          fi
          ALLOWED_HOSTS=(
            "release-assets.githubusercontent.com"
            "objects.githubusercontent.com"
            "objects-origin.githubusercontent.com"
          )
          MATCHED=0
          for HOST in "${ALLOWED_HOSTS[@]}"; do
            if [[ "$FINAL_URL" == https://${HOST}/* ]]; then
              echo "OK: HTTP 200 + final host matches allowlist entry '${HOST}'"
              MATCHED=1
              break
            fi
          done
          if [[ "$MATCHED" -ne 1 ]]; then
            echo "::error::Final CDN host is NOT in displayoff's update allowlist!"
            echo "::error::Final URL: $FINAL_URL"
            echo "::error::Allowed hosts: ${ALLOWED_HOSTS[*]}"
            echo "::error::Add the new host to _download_url_allowed() before users update."
            exit 1
          fi
